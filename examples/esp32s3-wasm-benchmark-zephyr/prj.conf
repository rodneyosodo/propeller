# Logging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_EARLY_CONSOLE=y

# Main thread stack — needs room for WAMR init + printf buffers
CONFIG_MAIN_STACK_SIZE=16384

# Thread support
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_NAME=y

# CPU usage tracking (used by metrics.c)
CONFIG_THREAD_RUNTIME_STATS=y

# Use minimal libc so malloc is backed by z_malloc_heap
# (enables heap stats via sys_heap_runtime_stats_get + CONFIG_SYS_HEAP_RUNTIME_STATS).
# ARENA_SIZE must be non-zero or malloc always returns NULL.
CONFIG_MINIMAL_LIBC=y
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=196608

# Heap runtime stats (used by metrics.c to report free/watermark bytes)
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# Stack safety
CONFIG_STACK_SENTINEL=y
CONFIG_INIT_STACKS=y

# Needed by WAMR
CONFIG_BASE64=y
CONFIG_FPU=y

# Disable WiFi and networking (not needed for benchmark)
CONFIG_WIFI=n
CONFIG_NETWORKING=n
