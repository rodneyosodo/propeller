global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: propeller-manager
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - propeller-manager:7070

  - job_name: propeller-proplet
    honor_timestamps: true
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets:
          - propeller-proplet:9092
