name: Continuous Delivery

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/absmach/propeller

jobs:
  docker-go:
    name: Docker Go / ${{ matrix.svc }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # riscv64 disabled for manager and proxy until wasmtime-go adds
          # riscv64 support: https://github.com/bytecodealliance/wasmtime-go/pull/285
          - { svc: manager, platforms: "linux/amd64,linux/arm64" }
          - { svc: cli,     platforms: "linux/amd64,linux/arm64,linux/riscv64" }
          - { svc: proxy,   platforms: "linux/amd64,linux/arm64" }

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=$(git describe --abbrev=0 --tags 2>/dev/null || echo 'v0.0.0')" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          build-args: |
            SVC=${{ matrix.svc }}
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            TIME=${{ steps.meta.outputs.time }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.svc }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.svc }}:${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-proplet:
    name: Docker proplet
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute build metadata
        id: meta
        run: |
          echo "version=$(git describe --abbrev=0 --tags 2>/dev/null || echo 'v0.0.0')" >> $GITHUB_OUTPUT
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "time=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.proplet
          # The builder stage uses FROM --platform=$BUILDPLATFORM so Rust
          # cross-compiles on the host (amd64) rather than running under QEMU.
          # wasmtime releases provide amd64 and arm64 Linux binaries.
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            TIME=${{ steps.meta.outputs.time }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/proplet:latest
            ${{ env.IMAGE_PREFIX }}/proplet:${{ steps.meta.outputs.commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-proplet-wasinn:
    name: Docker proplet (wasi-nn)
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.proplet-wasinn
          # OpenVINO backend is x86-only
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/proplet-wasi-nn:latest
            ${{ env.IMAGE_PREFIX }}/proplet-wasi-nn:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
