name: Rust Continuous Integration Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "proplet/**"
      - "examples/hal-test/**"
      - "examples/attestation-test/**"
      - ".github/**"

  pull_request:
    branches:
      - main
    paths:
      - "proplet/**"
      - "examples/hal-test/**"
      - "examples/attestation-test/**"
      - ".github/**"

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint-and-build:
    name: Rust Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./proplet

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check cargo
        run: cargo check --release

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run linter
        run: cargo clippy -- -D warnings

      - name: Check HAL WIT dep copies are identical
        working-directory: .
        run: |
          diff -r proplet/wit/hal/deps examples/hal-test/wit/deps
          diff -r proplet/wit/hal/deps examples/attestation-test/wit/deps

      - name: Run tests
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release
