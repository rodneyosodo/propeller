name: Rust Continuous Integration Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "proplet/**"
      - "examples/hal-test/**"
      - "examples/attestation-test/**"
      - ".github/**"

  pull_request:
    branches:
      - main
    paths:
      - "proplet/**"
      - "examples/hal-test/**"
      - "examples/attestation-test/**"
      - ".github/**"

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-lint-and-build:
    name: Rust Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./proplet

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Check cargo
        run: cargo check --release

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run linter
        run: cargo clippy -- -D warnings

      - name: Check HAL WIT copies are identical
        working-directory: .
        run: |
          diff -u proplet/wit/hal/hal.wit examples/hal-test/wit/deps/hal.wit
          diff -u proplet/wit/hal/hal.wit examples/attestation-test/wit/deps/hal.wit

      - name: Add wasm32-wasip2 target
        run: rustup target add wasm32-wasip2

      - name: Build hal-test P2 guest (for HAL e2e test)
        working-directory: ./examples/hal-test
        run: cargo build --target wasm32-wasip2 --release

      - name: Build attestation-test P2 guest
        working-directory: ./examples/attestation-test
        run: cargo build --target wasm32-wasip2 --release

      - name: Run tests
        env:
          PROPLET_E2E: "1"
        run: cargo test --verbose

      - name: Build release
        run: cargo build --release
